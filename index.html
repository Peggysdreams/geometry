// 同步把 data URL 轉成 Blob（不用 fetch）。
// navigator.share 必須在使用者手勢觸發的同一輪呼叫，中間只要經過一次
// 非同步等待（例如 await fetch(...)），部分瀏覽器（尤其 iOS Safari）
// 就會判定手勢已失效而拒絕分享，導致悄悄退回成不含圖片的純文字分享。
function dataUrlToBlobSync(dataUrl){
  const commaIdx = dataUrl.indexOf(',');
  const header = dataUrl.slice(0, commaIdx);
  const base64 = dataUrl.slice(commaIdx + 1);
  const mimeMatch = /data:([^;]+);base64/.exec(header);
  const mime = mimeMatch ? mimeMatch[1] : 'image/jpeg';
  const binary = atob(base64);
  const len = binary.length;
  const bytes = new Uint8Array(len);
  for(let i=0;i<len;i++){ bytes[i] = binary.charCodeAt(i); }
  return new Blob([bytes], { type: mime });
}

// 把圖片複製到系統剪貼簿，讓使用者之後能在 X 的發文框裡直接「貼上」。
// 這一步必須是使用者手勢觸發後、盡快呼叫，避免部分瀏覽器判定手勢已失效。
async function copyImagesToClipboard(images){
  if(!navigator.clipboard || !navigator.clipboard.write || typeof ClipboardItem === 'undefined') return false;
  try{
    const items = images.map(src=>{
      const blob = dataUrlToBlobSync(src);
      const type = blob.type || 'image/png';
      return new ClipboardItem({ [type]: blob });
    });
    await navigator.clipboard.write(items);
    return true;
  }catch(err){
    console.warn('複製圖片到剪貼簿失敗', err);
    return false;
  }
}

// 嘗試透過系統分享（Web Share API）把文字＋圖片一起帶到 X App／分享面板；
// 若裝置不支援（多半是電腦瀏覽器），改為把圖片複製到剪貼簿，
// 再帶著文字跳轉到 X 發文頁面，使用者只需在發文框裡「貼上」圖片即可。
async function shareEntryToX(entry, preOpenedWin){
  const text = buildTweetText(entry);
  const hasImages = entry.images && entry.images.length > 0;

  if(hasImages && navigator.share){
    try{
      // 全程同步轉檔，中間不 await 任何東西，確保呼叫 navigator.share 時
      // 使用者手勢仍然有效。
      const files = entry.images.map((src, i)=>{
        const blob = dataUrlToBlobSync(src);
        const ext = extFromMime(blob.type);
        return new File([blob], `diary-${entry.date}-${i+1}.${ext}`, { type: blob.type || 'image/jpeg' });
      });
      const shareData = { text, files };
      if(!navigator.canShare || navigator.canShare(shareData)){
        if(preOpenedWin && !preOpenedWin.closed) preOpenedWin.close();
        await navigator.share(shareData);
        return;
      }
    }catch(err){
      if(err && err.name === 'AbortError'){
        // 使用者自己取消了系統分享面板，不再強制跳出純文字視窗
        if(preOpenedWin && !preOpenedWin.closed) preOpenedWin.close();
        return;
      }
      console.warn('無法透過系統分享附上圖片，改用複製圖片＋跳轉 X', err);
    }
  }

  if(hasImages){
    const copied = await copyImagesToClipboard(entry.images);
    if(copied){
      showToast(entry.images.length > 1
        ? '圖片已複製到剪貼簿，即將前往 X — 貼上文字後記得再貼上圖片喔'
        : '圖片已複製到剪貼簿，即將前往 X — 記得在發文框裡貼上圖片喔');
    }
  }

  openXShareWindow(preOpenedWin, entry);
}

saveBtn.addEventListener('click', async ()=>{
  const text = textInput.value.trim();
  if(!text && pendingImages.length===0 && pendingVideos.length===0 && !selectedQuote) return;
  if(pendingVideos.some(v=>v.status==='uploading')){
    showModal('影片還在上傳到雲端硬碟，請稍候片刻再蓋上封蠟。', async ()=>{});
    return;
  }
  saveBtn.disabled = true;
  let entry = null;
  try{
    if(pendingImageJobs.length){
      await Promise.all(pendingImageJobs);
    }
    const wantShareX = xShareToggle.checked && !!text;
    // 若有圖片且裝置支援系統分享，交給 navigator.share 處理（不會被彈窗攔截）；
    // 否則才需要先同步開啟空白視窗，避免瀏覽器封鎖之後才導向的分享連結。
    const willUseWebShare = wantShareX && pendingImages.length > 0 && !!navigator.share;
    const xPreWin = (wantShareX && !willUseWebShare) ? window.open('', '_blank') : null;
    const finishedVideos = pendingVideos.filter(v=>v.status==='done' && v.drive).map(v=>v.drive);
    // 過濾掉真的處理失敗（仍為 null）的圖片，並讓縮圖與原圖保持同一份索引順序
    const validImageIdxs = pendingImages.map((v,i)=> v ? i : -1).filter(i=> i!==-1);
    const finalImages = validImageIdxs.map(i=>pendingImages[i]);
    const finalOriginals = validImageIdxs.map(i=>pendingOriginals[i]);
    entry = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      date: dateInput.value || todayStr(),
      text,
      images: finalImages,
      videos: finishedVideos,
      quote: selectedQuote ? { id: selectedQuote.id, date: selectedQuote.date, text: selectedQuote.text } : null,
      wax: { a: currentWax.a, b: currentWax.b },
      createdAt: Date.now()
    };
    entries.unshift(entry);
    if(wantShareX){
      // 盡量緊接著 entry 建立就呼叫分享，不等圖片存檔動作完成，
      // 降低使用者手勢在 navigator.share 呼叫前失效的機會。
      shareEntryToX(entry, xPreWin);
    }
    // 真正寫進儲存空間的兩步：任一步失敗都會丟出例外，進到下面的 catch，
    // 不會讓使用者以為存好了、其實根本沒存進去。
    await persistEntry(entry);
    await persistIndex();

    // 原圖另外分開存放（避免把主要日記資料撐太大），這屬於錦上添花的備份，
    // 存不進去也不影響前面已經成功存好的文章本身。
    finalOriginals.forEach((orig, idx)=>{
      if(!orig) return;
      if(orig.length > 4.5 * 1024 * 1024) return; // 保險：極端情況仍太大就不存原圖備份，縮圖版本已經存好了
      window.storage.set(`orig-img:${entry.id}-${idx}`, orig, false).catch(()=>{});
    });
    if(gDriveAccessToken && text){
      uploadTextToDrive(`${entry.date} 手記.txt`, text).catch(()=>{});
    }
    if(gDriveAccessToken){
      uploadEntryBackup(entry).then(f=>{
        if(f && f.id){
          entry.driveBackupId = f.id;
          persistEntry(entry).catch(()=>{});
        }
      }).catch(err=> console.warn('存檔時雲端備份失敗：', entry.id, err));
    }

    // 走到這裡代表真的存成功了，才清空手上正在寫的草稿
    textInput.value = '';
    charCount.textContent = '0 字';
    pendingImages = [];
    pendingOriginals = [];
    pendingImageJobs = [];
    renderPreview();
    pendingVideos.forEach(v=> URL.revokeObjectURL(v.previewUrl));
    pendingVideos = [];
    renderVideoPreview();
    selectedQuote = null;
    renderQuotePreview();
    dateInput.value = todayStr();
    currentWax = { a: PRESET_COLORS[0].color, b: PRESET_COLORS[0].color };
    applyWaxPreview();
    renderSealPattern();
    renderEntries();
    jumpToEntry('entry-' + entry.id);
  }catch(err){
    console.error('封蠟存檔失敗', err);
    // 存檔真的失敗了：把剛剛加進記憶體的那一筆退回去，避免畫面上看起來存了、
    // 其實沒真的寫進儲存空間；也不清空使用者還沒存到的文字／圖片草稿。
    if(entry){
      entries = entries.filter(e=>e.id!==entry.id);
      renderEntries();
    }
    const detail = (err && err.message) ? err.message : String(err);
    showModal(`這一頁存檔失敗了：${escapeHtml(detail)}<br>可能是圖片太大或太多，要不要試著減少圖片數量再存一次？`, async ()=>{});
  }finally{
    saveBtn.disabled = false;
  }
});

const weekChars = ['日','一','二','三','四','五','六'];

function renderEntries(){
  if(entries.length===0){
    searchResultCount.style.display = 'none';
    entriesContainer.innerHTML = `
      <div class="empty-state">
        <div class="glyph">未</div>
        <p>還沒有落筆的一頁。<br>寫下第一段文字，蓋上今天的封蠟吧。</p>
      </div>`;
    return;
  }

  let list = entries;
  if(searchQuery){
    list = entries.filter(e=>{
      const inText = entryBodyText(e).toLowerCase().includes(searchQuery);
      const inDate = e.date && e.date.toLowerCase().includes(searchQuery);
      const inWax = waxCategoryName(e).toLowerCase().includes(searchQuery);
      return inText || inDate || inWax;
    });
    searchResultCount.style.display = 'block';
    searchResultCount.textContent = list.length > 0
      ? `找到 ${list.length} 篇符合的紀錄`
      : '沒有找到符合的紀錄';
  } else {
    searchResultCount.style.display = 'none';
  }

  if(list.length===0){
    entriesContainer.innerHTML = `
      <div class="empty-state">
        <div class="glyph">尋</div>
        <p>沒有找到符合「${escapeHtml(searchInput.value.trim())}」的紀錄。</p>
      </div>`;
    return;
  }

  entriesContainer.innerHTML = '';
  list.forEach(entry=>{
    const d = new Date(entry.date + 'T00:00:00');
    const validDate = !isNaN(d.getTime());
    const y = validDate ? d.getFullYear() : '';
    const md = validDate ? (d.getMonth()+1)+'/'+d.getDate() : entry.date;
    const w = validDate ? '週'+weekChars[d.getDay()] : '';

    const el = document.createElement('div');
    el.className = 'entry';
    el.id = 'entry-' + entry.id;
    const floatDur = (6 + (entry.id.charCodeAt(0)%4)).toFixed(1);
    const floatDelay = -((entry.id.charCodeAt(entry.id.length-1)%5)).toFixed(1);
    el.style.animationDuration = floatDur + 's';
    el.style.animationDelay = floatDelay + 's';
    const waxA = (entry.wax && entry.wax.a) || PRESET_COLORS[0].color;
    const waxB = (entry.wax && entry.wax.b) || waxA;
    el.innerHTML = `
      <div class="stamp" title="按下封蠟，呈現這篇文章" style="--wax-a:${waxA};--wax-b:${waxB};">
        ${seededSealPatternFor(entry)}
        <div class="y">${y}</div>
        <div class="md">${md}</div>
        <div class="w">${w}</div>
      </div>
      <div class="entry-paper">
        ${entry.quote ? `<div class="entry-quote${entry.quote.id ? ' eq-link':''}" ${entry.quote.id ? `data-target="entry-${entry.quote.id}"` : ''}><div class="eq-date">引自 ${entry.quote.date}${entry.quote.id ? ' →' : ''}</div><div class="eq-text">${escapeHtml(entry.quote.text)}${entry.quote.text.length>=120?'…':''}</div></div>` : ''}
        ${entry.text ? `<div class="entry-text">${escapeHtml(entry.text)}</div>` : ''}
        ${entry.images && entry.images.length ? `<div class="entry-images">${entry.images.map((src, idx)=>`<div class="photo" data-entry-id="${entry.id}" data-idx="${idx}"><img src="${src}"></div>`).join('')}</div>` : ''}
        ${entry.videos && entry.videos.length ? `<div class="entry-videos">${entry.videos.map(v=>`<a class="entry-video-link" href="${v.webViewLink}" target="_blank" rel="noopener">🎬 ${escapeHtml(v.name)}<span class="drive-badge">☁ 於雲端硬碟開啟 →</span></a>`).join('')}</div>` : ''}
        <div class="entry-actions">
          <button class="entry-quote-btn" data-id="${entry.id}">↩ 引用這篇</button>
          <button class="entry-wax-btn" data-id="${entry.id}" title="更改這篇的封蠟顏色"><span class="wax-btn-dot" style="background:${waxA};"></span>換封蠟顏色</button>
          <button class="entry-share-x" data-id="${entry.id}">𝕏 分享</button>
          <button class="entry-del" data-id="${entry.id}">刪除這一頁</button>
        </div>
      </div>
    `;
    el.querySelector('.stamp').addEventListener('click', ()=> jumpToEntry('entry-' + entry.id));
    const quoteBlock = el.querySelector('.eq-link');
    if(quoteBlock){
      quoteBlock.addEventListener('click', ()=>{
        const targetId = quoteBlock.getAttribute('data-target');
        jumpToEntry(targetId);
      });
    }
    el.querySelector('.entry-quote-btn').addEventListener('click', ()=> quickQuote(entry.id));
    el.querySelector('.entry-wax-btn').addEventListener('click', ()=> changeEntryWaxColor(entry));
    el.querySelector('.entry-share-x').addEventListener('click', ()=>{
      const hasImages = entry.images && entry.images.length > 0;
      const willUseWebShare = hasImages && !!navigator.share;
      const preWin = willUseWebShare ? null : window.open('', '_blank');
      shareEntryToX(entry, preWin);
    });
    el.querySelectorAll('.photo').forEach(photoEl=>{
      photoEl.addEventListener('click', ()=>{
        const idx = Number(photoEl.getAttribute('data-idx'));
        const fallbackSrc = entry.images[idx];
        openImageLightbox(entry.id, idx, fallbackSrc);
      });
    });
    el.querySelector('.entry-del').addEventListener('click', ()=> confirmDelete(entry.id));
    entriesContainer.appendChild(el);
  });
}

function jumpToEntry(targetId){
  const target = document.getElementById(targetId);
  if(!target){
    showModal('這篇被引用的文章已經不在了。', async ()=>{});
    return;
  }
  target.scrollIntoView({behavior:'smooth', block:'center'});
  target.classList.add('entry-flash');
  setTimeout(()=> target.classList.remove('entry-flash'), 1600);
}

function quickQuote(entryId){
  const entry = entries.find(e=>e.id===entryId);
  if(!entry) return;
  selectedQuote = { id: entry.id, date: entry.date, text: entryBodyText(entry).slice(0,120) };
  renderQuotePreview();
  document.querySelector('.composer').scrollIntoView({behavior:'smooth', block:'start'});
  textInput.focus();
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// 開啟圖片燈箱：先顯示目前已存的（可能是縮圖版）圖片，
// 同時嘗試向背景另外存放的原圖資料要圖，拿得到就換成原圖並允許下載原圖。
async function openImageLightbox(entryId, idx, fallbackSrc){
  lightboxImg.src = fallbackSrc;
  lightboxNote.textContent = '讀取原圖中…';
  lightboxDownloadBtn.dataset.src = fallbackSrc;
  lightboxDownloadBtn.dataset.entryId = entryId;
  lightboxDownloadBtn.dataset.idx = String(idx);
  imageLightbox.classList.add('show');

  try{
    const key = `orig-img:${entryId}-${idx}`;
    const res = await window.storage.get(key, false);
    if(res && res.value){
      lightboxImg.src = res.value;
      lightboxDownloadBtn.dataset.src = res.value;
      lightboxNote.textContent = '原圖';
    } else {
      lightboxNote.textContent = '（找不到原圖，顯示的是站上保存的縮圖版本）';
    }
  }catch(err){
    lightboxNote.textContent = '（找不到原圖，顯示的是站上保存的縮圖版本）';
  }
}

function closeImageLightbox(){
  imageLightbox.classList.remove('show');
  lightboxImg.src = '';
}

lightboxCloseBtn.addEventListener('click', closeImageLightbox);
imageLightbox.addEventListener('click', (e)=>{
  if(e.target === imageLightbox) closeImageLightbox();
});
lightboxDownloadBtn.addEventListener('click', ()=>{
  const src = lightboxDownloadBtn.dataset.src;
  if(!src) return;
  const idx = lightboxDownloadBtn.dataset.idx;
  const mimeMatch = /^data:image\/([a-zA-Z0-9+.-]+);/.exec(src);
  const ext = mimeMatch ? mimeMatch[1].replace('jpeg','jpg') : 'jpg';
  const a = document.createElement('a');
  a.href = src;
  a.download = `diary-image-${lightboxDownloadBtn.dataset.entryId}-${idx}.${ext}`;
  document.body.appendChild(a);
  a.click();
  a.remove();
});

function showModal(message, onConfirm){
  modalRoot.innerHTML = `
    <div class="modal-bg">
      <div class="modal">
        <p>${message}</p>
        <div class="modal-actions">
          <button class="cancel">取消</button>
          <button class="confirm">確定</button>
        </div>
      </div>
    </div>`;
  modalRoot.querySelector('.cancel').addEventListener('click', ()=> modalRoot.innerHTML='');
  modalRoot.querySelector('.confirm').addEventListener('click', async ()=>{
    modalRoot.innerHTML='';
    await onConfirm();
  });
}

function confirmDelete(id){
  showModal('確定要刪除這一頁紀錄嗎？此動作無法復原。', async ()=>{
    const target = entries.find(e=>e.id===id);
    entries = entries.filter(e=>e.id!==id);
    await persistIndex();
    await deleteEntryStorage(id);
    if(target && target.images){
      target.images.forEach((_, idx)=>{
        window.storage.delete(`orig-img:${id}-${idx}`, false).catch(()=>{});
      });
    }
    if(target && target.driveBackupId){
      deleteDriveFile(target.driveBackupId).catch(()=>{});
    }
    renderEntries();
  });
}

clearAllBtn.addEventListener('click', ()=>{
  if(entries.length===0) return;
  showModal('確定要清空所有日記紀錄嗎？此動作無法復原。', async ()=>{
    const targets = entries.slice();
    const idsToDelete = entries.map(e=>e.id);
    entries = [];
    await persistIndex();
    idsToDelete.forEach(id=> deleteEntryStorage(id));
    targets.forEach(t=>{
      if(t.driveBackupId) deleteDriveFile(t.driveBackupId).catch(()=>{});
    });
    renderEntries();
  });
});

loadEntries().then(()=>{ trySilentDriveReconnect(); });

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(err=>{
      console.warn('Service worker 註冊失敗：', err);
    });
  });
}
